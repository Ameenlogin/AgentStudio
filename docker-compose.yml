# Agent Studio — one-command hosted deployment.
#
#   docker compose up -d --build
#
# Serves the app behind Caddy with automatic HTTPS (Let's Encrypt) for
# onaiagents.com. Agent Studio is login-gated and billed per session; each
# signed-in account gets its OWN isolated workspace under /data/workspaces and
# still brings its own NVIDIA NIM key in the browser. Point the domain's A
# record at this server first so Caddy can issue the certificate.

services:
  app:
    build:
      context: "https://github.com/Ameenlogin/AgentStudio.git#deploy"
    image: agentstudio:latest
    restart: unless-stopped
    environment:
      - AGENT_STUDIO_DB=/data/agent_studio.db
      # Hosted mode: require sign-in, bill 10 cr/session, isolate each account.
      - AGENT_STUDIO_HOSTED=1
      # Per-user workspaces live on the persistent volume (survive redeploys).
      - AGENT_STUDIO_WORKSPACES=/data/workspaces
    volumes:
      - app_data:/data
    expose:
      - "8000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config

configs:
  caddyfile:
    content: |
      onaiagents.com, www.onaiagents.com {
        encode zstd gzip
        reverse_proxy app:8000
      }

volumes:
  app_data:
  caddy_data:
  caddy_config:
