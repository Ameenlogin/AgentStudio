<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="cu" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E08A66"/>
      <stop offset="1" stop-color="#C15F40"/>
    </linearGradient>
  </defs>
  <!-- copper app tile -->
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#cu)"/>
  <!-- white asterisk-spark: three crossing capsules => six tapered rays -->
  <g fill="#FFFFFF">
    <rect x="27.4" y="10.5" width="9.2" height="43" rx="4.6"/>
    <rect x="27.4" y="10.5" width="9.2" height="43" rx="4.6" transform="rotate(60 32 32)"/>
    <rect x="27.4" y="10.5" width="9.2" height="43" rx="4.6" transform="rotate(120 32 32)"/>
  </g>
</svg>
