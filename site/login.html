<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — onaiagents</title>
<meta name="theme-color" content="#FAF9F5" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
<style>
  .gbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;background:#fff;border:1px solid var(--border);border-radius:10px;padding:11px;font-weight:600;font-size:14.5px;color:var(--ink);cursor:pointer;transition:.16s;margin-bottom:14px}
  .gbtn:hover{border-color:var(--ink);box-shadow:var(--shadow-lift)}
  .orline{display:flex;align-items:center;text-align:center;color:var(--faint);font-size:12px;margin:2px 0 14px}
  .orline::before,.orline::after{content:"";flex:1;height:1px;background:var(--border)}
  .orline span{padding:0 12px}
</style>
</head>
<body>
<nav><div class="wrap nav-in">
  <a class="brand" href="/"><img class="spark" src="/favicon.svg" alt="" onerror="this.style.display='none'"/>onaiagents</a>
  <div class="nav-right"><a class="btn-text" href="/">← Back to site</a></div>
</div></nav>

<main class="narrow">
  <div style="text-align:center;margin-bottom:24px">
    <h1 style="font-family:var(--font-display);font-weight:500;font-size:2rem;letter-spacing:-.02em" id="title">Welcome back</h1>
    <p style="color:var(--muted);margin-top:6px;font-size:14.5px" id="sub">Sign in to your onaiagents account.</p>
  </div>

  <div class="tabs">
    <button id="tabLogin" class="on" type="button">Sign in</button>
    <button id="tabReg" type="button">Create account</button>
  </div>

  <div class="panel">
    <button class="gbtn" id="googleBtn" type="button" style="display:none">
      <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      Continue with Google
    </button>
    <div class="orline" id="orDiv" style="display:none"><span>or use email</span></div>
    <div class="err" id="err" style="display:none"></div>
    <form id="form">
      <div class="field" id="nameRow" style="display:none">
        <div class="lbl">Name</div>
        <input type="text" id="name" placeholder="Your name" autocomplete="name" />
      </div>
      <div class="field">
        <div class="lbl">Email</div>
        <input type="email" id="email" placeholder="you@email.com" autocomplete="email" required />
      </div>
      <div class="field">
        <div class="lbl">Password</div>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn btn-primary" id="submit" type="submit" style="width:100%;margin-top:4px">Sign in</button>
    </form>
    <p style="text-align:center;color:var(--faint);font-size:12.5px;margin-top:16px" id="freeNote"></p>
  </div>
</main>

<script>
  var mode='login';
  var q=new URLSearchParams(location.search); var next=q.get('next')||'/account';
  function setMode(m){mode=m;
    document.getElementById('tabLogin').classList.toggle('on',m==='login');
    document.getElementById('tabReg').classList.toggle('on',m==='register');
    document.getElementById('nameRow').style.display=m==='register'?'block':'none';
    document.getElementById('title').textContent=m==='register'?'Create your account':'Welcome back';
    document.getElementById('sub').textContent=m==='register'?'Start with free credits — no card needed.':'Sign in to your onaiagents account.';
    document.getElementById('submit').textContent=m==='register'?'Create account':'Sign in';
    document.getElementById('password').autocomplete=m==='register'?'new-password':'current-password';
    document.getElementById('err').style.display='none';
  }
  document.getElementById('tabLogin').onclick=function(){setMode('login')};
  document.getElementById('tabReg').onclick=function(){setMode('register')};
  fetch('/api/site/config').then(r=>r.json()).then(c=>{
    document.getElementById('freeNote').textContent='New accounts get '+c.free_credits+' free credits.';
    if(c.google_ready){document.getElementById('googleBtn').style.display='flex';document.getElementById('orDiv').style.display='flex';}
  });
  document.getElementById('googleBtn').onclick=function(){location.href='/api/site/auth/google/start?next='+encodeURIComponent(next);};
  (function(){var er=q.get('error');if(er){var e=document.getElementById('err');e.textContent=(er.indexOf('google')>-1?'Google sign-in didn’t complete. Try again, or use email below.':'Sign-in error. Please try again.');e.style.display='block';}})();

  document.getElementById('form').onsubmit=function(e){e.preventDefault();
    var err=document.getElementById('err'),btn=document.getElementById('submit');
    btn.disabled=true;
    fetch('/api/site/'+(mode==='register'?'register':'login'),{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email:document.getElementById('email').value,password:document.getElementById('password').value,name:document.getElementById('name').value})})
    .then(async r=>{var d=await r.json();if(!r.ok)throw new Error(d.detail||'Something went wrong');location.href=next;})
    .catch(e=>{err.textContent=e.message;err.style.display='block';btn.disabled=false;});
  };
</script>
</body>
</html>
